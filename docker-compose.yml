version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: myuser   
      POSTGRES_PASSWORD: mypass  
      POSTGRES_DB: mydb        
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data  
      - ./init:/docker-entrypoint-initdb.d/

volumes:
  postgres_data:
    driver: local
