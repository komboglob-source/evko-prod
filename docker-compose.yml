name: ${COMPOSE_PROJECT_NAME:-evko}

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    init: true
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-0000}
      POSTGRES_DB: ${POSTGRES_DB:-ebko}
      TZ: ${TZ:-Europe/Moscow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-ebko}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  backend:
    image: ${BACKEND_IMAGE:-evko-backend:latest}
    build:
      context: ./CRM_BE
    restart: unless-stopped
    init: true
    environment:
      TZ: ${TZ:-Europe/Moscow}
      DATABASE_URL: host=postgres port=5432 user=${POSTGRES_USER:-user} password=${POSTGRES_PASSWORD:-0000} dbname=${POSTGRES_DB:-ebko} sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8080"
    ports:
      - "${BACKEND_BIND:-127.0.0.1}:${BACKEND_PORT:-18080}:8080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O /dev/null http://127.0.0.1:8080/healthz || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  frontend:
    image: ${FRONTEND_IMAGE:-evko-frontend:latest}
    build:
      context: ./CRM_FE/ebko-crm
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_USE_MOCK_DATA: ${VITE_USE_MOCK_DATA:-false}
        VITE_MOCK_DELAY_MS: ${VITE_MOCK_DELAY_MS:-0}
    restart: unless-stopped
    init: true
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_BIND:-0.0.0.0}:${FRONTEND_PORT:-8088}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

volumes:
  postgres_data:
